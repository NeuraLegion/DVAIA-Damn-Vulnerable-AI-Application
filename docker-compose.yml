# DVAIA: Docker setup with OpenAI API + Qdrant vector store
# Run: docker compose up --build
# Requires OPENAI_API_KEY to be set in .env
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dvaia-qdrant
    networks:
      - dvaia
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    # No persistent volume: each docker compose up starts with empty vector store.
    restart: "no" #unless-stopped

  dvaia:
    build: .
    container_name: dvaia-app
    networks:
      - dvaia
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PORT=${PORT:-5000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o-mini}
      # All data stored in /tmp (cleared when container stops)
      - DATABASE_URI=/tmp/app.db
      - UPLOAD_DIR=/tmp/uploads
      - PAYLOADS_OUTPUT_DIR=/tmp/payloads/generate
    ports:
      - "${PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5); raise SystemExit(0 if r.status == 200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 20s
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no" #unless-stopped

networks:
  dvaia:
    driver: bridge
